<style>
  /* ==== GHOST-TOKENS (managed by theme-sync — do not edit between markers) ==== */

    --ease-standard: cubic-bezier(0.2, 0, 0, 1);
    --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  /* ==== /GHOST-TOKENS ==== */
  /* Light theme re-pointed onto Ghost neutrals. --accent stays the amber brand
     signature (editor caret, selection, links, task checks) — chrome primary
     buttons use black via --btn-primary below. */
  :root {
    --bg: var(--bg-token); --fg: var(--text-primary); --muted: var(--text-secondary); --accent: #b07d2e;
    --rule: var(--border); --rule-strong: var(--border-strong);
    --card-bg: var(--surface-panel); --shadow: var(--shadow-sm);

  [data-theme="dark"] {
    --bg: #282c34; --fg: #abb2bf; --muted: #5c6370; --accent: #61afef;
    --rule: #3b4048; --rule-strong: #4b525c; --card-bg: #21252b; --shadow: 0 8px 24px rgba(0,0,0,.45);
  }
  [data-theme="sepia"] {
    --bg: #f3ead5; --fg: #3a2e1f; --muted: #8a7a5a; --accent: #9b6a1f;
    --rule: #ddd1b3; --rule-strong: #c4b48c; --card-bg: #fbf4e0; --shadow: 0 8px 24px rgba(80,60,30,.12);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg);
    font-family: var(--font); font-size: 16px; line-height: 1.7; }
  #topbar { position: fixed; top: 0; left: 0; right: 0; height: 42px; z-index: 6;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 10px; gap: 8px; background: var(--bg); border-bottom: 1px solid var(--rule);
    font-size: 12px; color: var(--muted); }
  .row { display: flex; align-items: center; gap: 10px; }
  #filename { color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #topleft { flex: 1; min-width: 0; }
  #topleft { gap: 7px; }
  #fileBtn { background: none; border: 0; border-radius: 7px; padding: 3px 5px; margin: 0; line-height: 0; cursor: pointer; display: inline-flex; align-items: center; }
  #fileBtn:hover { background: var(--rule); }
  #fileBtn img { display: block; }
  #aboutDialog { position: fixed; inset: 0; z-index: 60; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,.45); }
  #aboutDialog.show { display: flex; }
  #aboutDialog .about-card { background: var(--surface-panel); border: 1px solid var(--rule); border-radius: var(--radius); box-shadow: var(--shadow-lg); padding: 22px 24px; width: min(320px, 86vw); text-align: center; }
  #aboutDialog .about-card h2 { margin: 8px 0 2px; font-size: 18px; color: var(--fg); }
  #aboutDialog .about-ver { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  #aboutDialog .about-msg { font-size: 13px; color: var(--fg); min-height: 18px; margin-bottom: 14px; }
  #aboutDialog .about-msg a { color: var(--accent); }
  #aboutDialog .about-actions { display: flex; gap: 8px; justify-content: center; }
  #aboutDialog .about-actions button { padding: 7px 14px; font-size: 13px; font-family: inherit; border: 1px solid var(--rule); border-radius: var(--radius-control); background: var(--card-bg); color: var(--fg); cursor: pointer; }
  #aboutDialog .about-actions button:hover { background: var(--color-grey-100); }
  #aboutDialog .about-actions button.primary { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }
  #aboutDialog .about-actions button.primary:hover { opacity: .85; background: var(--text-primary); }
  #helpDialog { position: fixed; inset: 0; z-index: 61; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,.45); }
  #helpDialog.show { display: flex; }
  #helpDialog .help-card { background: var(--surface-panel); border: 1px solid var(--rule); border-radius: var(--radius); box-shadow: var(--shadow-lg); width: min(540px, 92vw); max-height: 84vh; display: flex; flex-direction: column; }
  #helpDialog .help-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--rule); }
  #helpDialog .help-head h2 { margin: 0; font-size: 17px; color: var(--fg); }
  #helpDialog .help-head button { background: none; border: 0; font-size: 18px; color: var(--muted); cursor: pointer; }
  #helpDialog .help-body { overflow-y: auto; padding: 16px 20px; font-size: 14px; line-height: 1.6; color: var(--fg); }
  #helpDialog .help-body h3 { font-size: 14px; margin: 16px 0 4px; color: var(--fg); }
  #helpDialog .help-body h3:first-child { margin-top: 0; }
  #helpDialog .help-body p { margin: 4px 0; color: var(--muted); }
  #helpDialog .help-body code { background: var(--rule); padding: 1px 5px; border-radius: 4px; font-size: 12.5px; }
  #helpDialog .help-body ul { margin: 4px 0; padding-left: 18px; }
  #helpDialog .help-body li { margin: 3px 0; color: var(--muted); }
  #helpDialog .help-body b { color: var(--fg); }
  #feedbackDialog { position: fixed; inset: 0; z-index: 61; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,.45); }
  #feedbackDialog.show { display: flex; }
  #feedbackDialog .fb-card { background: var(--surface-panel); border: 1px solid var(--rule); border-radius: var(--radius); box-shadow: var(--shadow-lg); width: min(440px, 92vw); padding: 18px 20px; }
  #feedbackDialog h2 { margin: 0 0 4px; font-size: 16px; color: var(--fg); }
  #feedbackDialog .fb-sub { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  #feedbackDialog textarea { width: 100%; box-sizing: border-box; min-height: 110px; padding: 9px 11px; font-size: 13px; font-family: inherit; border: 1px solid var(--rule); border-radius: var(--radius-control); background: var(--bg); color: var(--fg); resize: vertical; }
  #feedbackDialog textarea:focus { outline: none; border-color: var(--accent); }
  #feedbackDialog input { width: 100%; box-sizing: border-box; padding: 8px 11px; font-size: 13px; font-family: inherit; border: 1px solid var(--rule); border-radius: var(--radius-control); background: var(--bg); color: var(--fg); margin-top: 8px; }
  #feedbackDialog .fb-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
  #feedbackDialog .fb-actions button { padding: 7px 14px; font-size: 13px; font-family: inherit; border: 1px solid var(--rule); border-radius: var(--radius-control); background: var(--card-bg); color: var(--fg); cursor: pointer; }
  #feedbackDialog .fb-actions button.primary { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }
  #feedbackDialog .fb-actions button:disabled { opacity: .5; cursor: default; }
  #fileMenu .fm-sub { float: right; color: var(--muted); font-size: 11px; margin-left: 16px; }
  /* cascading submenus (Theme / Font) — flyout to the right */
  #fileMenu .fm-sub-item { position: relative; }
  #fileMenu .fm-label { display: flex; align-items: center; justify-content: space-between; gap: 18px; padding: 7px 11px; border-radius: 5px; font-size: 13px; color: var(--fg); cursor: default; }
  #fileMenu .fm-sub-item:hover > .fm-label { background: var(--rule); }
  #fileMenu .fm-arrow { color: var(--muted); font-size: 10px; }
  #fileMenu .fm-flyout { position: absolute; left: 100%; top: -5px; min-width: 150px; background: var(--card-bg); border: 1px solid var(--rule); border-radius: 8px; box-shadow: var(--shadow); padding: 5px; display: none; z-index: 41; }
  #fileMenu .fm-sub-item:hover > .fm-flyout { display: block; }
  #fileMenu .fm-flyout button { display: block; width: 100%; text-align: left; background: none; border: 0; padding: 7px 11px; border-radius: 5px; color: var(--fg); font-family: inherit; font-size: 13px; cursor: pointer; }
  #fileMenu .fm-flyout button:hover, #fileMenu .fm-flyout button.sel { background: var(--rule); }
  #topright { flex-shrink: 0; gap: 7px; }
  .btn.ic { min-width: 28px; padding: 4px 6px; text-align: center; }
  #bottomstrip { position: fixed; bottom: 0; left: 0; right: 0; height: 30px; z-index: 5;
    display: flex; align-items: center; justify-content: space-between; padding: 0 12px;
    background: var(--bg); border-top: 1px solid var(--rule); font-size: 11px; color: var(--muted); }
  #drawhint b { color: var(--fg); }
  #fontSelect { background: transparent; color: var(--fg); border: 1px solid var(--rule-strong);
    border-radius: var(--radius-control); padding: 2px 6px; font-family: inherit; font-size: 11px; cursor: pointer; }
  #fontSelect:hover { border-color: var(--text-primary); }
  body[data-font="mono"] .cm-content { font-family: "IBM Plex Mono", ui-monospace, Menlo, monospace; }
  body[data-font="serif"] .cm-content { font-family: "IBM Plex Serif", Georgia, serif; }
  body[data-font="lora"] .cm-content { font-family: "Lora", Georgia, serif; }
  body[data-font="newsreader"] .cm-content { font-family: "Newsreader", Georgia, serif; }
  body[data-font="sans"] .cm-content { font-family: "Inter", system-ui, sans-serif; }
  body[data-font="atkinson"] .cm-content { font-family: "Atkinson Hyperlegible", system-ui, sans-serif; }
  body[data-font="lexend"] .cm-content { font-family: "Lexend", system-ui, sans-serif; }
  /* Comfortable spacing — evidence-based reading-comfort mode (wider letter/word/line spacing reduces visual crowding) */
  body.roomy .cm-content { line-height: 2 !important; }
  body.roomy .cm-line { letter-spacing: .045em; word-spacing: .2em; }
  body[data-font="shantell"] .cm-content { font-family: "Shantell Sans", "Comic Sans MS", cursive; font-size: 17px; }
  body[data-font="caveat"] .cm-content { font-family: "Caveat", cursive; font-size: 20px; line-height: 1.5; }
  .btn { background: var(--card-bg); border: 1px solid var(--rule-strong); border-radius: var(--radius-control);
    padding: 4px 10px; color: var(--fg); font-family: inherit; font-size: 12px;
    cursor: pointer; transition: background .15s, border-color .15s; }
  .btn:hover { background: var(--color-grey-100); }
  .btn.accent { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }
  .btn.accent:hover { opacity: .85; background: var(--text-primary); }
  #editor { position: absolute; top: 76px; bottom: 30px; left: 0; right: 0; overflow: auto; }
  /* preview (rendered "final" markdown) — read-only */
  #previewArea { position: absolute; top: 76px; bottom: 0; left: 0; right: 0; overflow: auto; display: none; background: var(--bg); }
  body.previewing #editor, body.previewing #bottomstrip, body.previewing #composeFmt { display: none; }
  body.previewing #composePreview { margin-left: auto; }
  body.previewing #previewArea { display: block; }
  #composePreview { flex-shrink: 0; }
  #previewArea .pv-doc { max-width: 70ch; margin: 0 auto; padding: 40px 24px 90px; color: var(--fg); line-height: 1.7; }
  #previewArea .pv-loading { padding: 40px; text-align: center; color: var(--muted); }
  #previewArea h1 { font-size: 1.7em; } #previewArea h2 { font-size: 1.4em; } #previewArea h3 { font-size: 1.2em; }
  #previewArea h1, #previewArea h2, #previewArea h3, #previewArea h4 { font-weight: 700; line-height: 1.25; margin: 1.1em 0 .4em; }
  #previewArea p { margin: .8em 0; } #previewArea ul, #previewArea ol { padding-left: 1.5em; margin: .6em 0; } #previewArea li { margin: .2em 0; }
  #previewArea a { color: var(--accent); }
  #previewArea strong { font-weight: 700; } #previewArea em { font-style: italic; } #previewArea del { text-decoration: line-through; color: var(--muted); }
  #previewArea code { background: color-mix(in srgb, var(--rule) 60%, transparent); padding: 1px 5px; border-radius: 4px; font-size: .9em; }
  #previewArea pre { background: color-mix(in srgb, var(--rule) 50%, transparent); padding: 11px 13px; border-radius: 7px; overflow: auto; } #previewArea pre code { background: none; padding: 0; }
  #previewArea blockquote { border-left: 3px solid var(--rule); padding-left: 13px; margin: .8em 0; color: var(--muted); }
  #previewArea li:has(> input[type=checkbox]) { list-style: none; margin-left: -1.3em; } #previewArea input[type=checkbox] { margin-right: 7px; accent-color: var(--accent); }
  #previewArea figure { margin: 1.3em 0; text-align: center; } #previewArea figure svg { max-width: 100%; height: auto; }
  #previewArea figcaption { color: var(--muted); font-size: .85em; font-style: italic; margin-bottom: 6px; }
  body[data-theme="dark"] #previewArea figure svg { filter: invert(.9) hue-rotate(180deg); }
  #previewArea table.print-sheet { border-collapse: collapse; margin: 1em 0; font-size: .95em; }
  #previewArea .print-sheet th, #previewArea .print-sheet td { border: 1px solid var(--rule); padding: 4px 10px; }
  #previewArea .print-sheet th { background: color-mix(in srgb, var(--rule) 50%, transparent); text-align: left; }
  #composeBar { position: fixed; top: 42px; left: 0; right: 0; height: 34px; z-index: 5;
    display: flex; align-items: center; gap: 8px; padding: 0 10px;
    background: var(--bg); border-bottom: 1px solid var(--rule); }
  #composeFmt { flex: 1; min-width: 0; display: flex; align-items: center; gap: 1px; overflow-x: auto;
    scrollbar-width: thin; scrollbar-color: var(--rule) transparent; }
  #composeFmt::-webkit-scrollbar { height: 6px; }
  #composeFmt::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }
  #composeFmt::-webkit-scrollbar-track { background: transparent; }
  #composeFmt button { background: none; border: 0; border-radius: 4px; padding: 4px 7px; min-width: 26px; flex-shrink: 0;
    color: var(--fg); font-family: inherit; font-size: 13px; cursor: pointer; }
  #composeFmt button:hover { background: var(--rule); }
  #composeFmt button b { font-weight: 700; } #composeFmt button i { font-style: italic; } #composeFmt button s { text-decoration: line-through; }
  #composeFmt .fmtsep { width: 1px; height: 16px; background: var(--rule); margin: 0 3px; flex-shrink: 0; }
  #composeCopy { flex-shrink: 0; }
  .cm-editor { background: var(--bg); color: var(--fg); height: 100%; }
  .cm-editor.cm-focused { outline: none; }
  .cm-scroller { font-family: inherit; }
  .cm-content { max-width: 70ch; margin: 0 auto; padding: 40px 20px 200px; caret-color: var(--accent); }
  .cm-cursor { border-left: 2px solid var(--accent) !important; }
  .cm-gutters { display: none; }
  ::selection { background: rgba(176,125,46,.2); }
  /* slim, unobtrusive scrollbars */
  .cm-scroller, #editor, #tasksList, #overlay-canvas { scrollbar-width: thin; scrollbar-color: var(--rule) transparent; }
  .cm-scroller::-webkit-scrollbar, #editor::-webkit-scrollbar, #tasksList::-webkit-scrollbar { width: 10px; height: 10px; }
  .cm-scroller::-webkit-scrollbar-track, #editor::-webkit-scrollbar-track, #tasksList::-webkit-scrollbar-track { background: transparent; }
  .cm-scroller::-webkit-scrollbar-thumb, #editor::-webkit-scrollbar-thumb, #tasksList::-webkit-scrollbar-thumb {
    background: var(--rule); border-radius: 6px; border: 3px solid transparent; background-clip: padding-box; }
  .cm-scroller::-webkit-scrollbar-thumb:hover, #editor::-webkit-scrollbar-thumb:hover, #tasksList::-webkit-scrollbar-thumb:hover {
    background: var(--muted); background-clip: padding-box; }

  /* draw block (collapsed, inline) */
  .drawblock { margin: 14px 0; border: 1px solid var(--rule); border-radius: 8px;
    background: var(--card-bg); overflow: hidden; box-shadow: var(--shadow); }
  .drawblock-bar { display: flex; align-items: center; justify-content: space-between;
    padding: 7px 12px; border-bottom: 1px solid var(--rule); font-size: 12px; color: var(--muted);
    font-family: var(--font); }
  .drawblock-bar .ttl { color: var(--fg); display: flex; align-items: center; gap: 7px; }
  .drawblock-bar .acts { display: flex; gap: 6px; }
  .drawblock-bar .acts button { background: none; border: 1px solid var(--rule);
    border-radius: 5px; padding: 3px 0; min-width: 26px; text-align: center; font-size: 12px; color: var(--muted);
    font-family: inherit; cursor: pointer; }
  .drawblock-bar .acts button:hover { background: var(--rule); color: var(--fg); }
  .drawblock-bar .acts .del { color: #e54848; }
  .drawblock-bar .acts .del:hover { background: #e54848; color: #fff; border-color: #e54848; }
  .drawblock-preview { display: flex; align-items: center; justify-content: center;
    min-height: 120px; max-height: 320px; padding: 12px; cursor: pointer; background: transparent; }
  .drawblock-preview svg { max-width: 100%; max-height: 296px; height: auto; }
  /* dark mode: flip the drawing's luminance so dark strokes read as light on the dark card */
  [data-theme="dark"] .drawblock-preview svg { filter: invert(0.9) hue-rotate(180deg); }
  .drawblock-empty { color: var(--muted); font-size: 13px; padding: 32px; text-align: center; cursor: pointer; }
  .drawblock-grip { cursor: grab; user-select: none; }
  .drawblock-grip:active { cursor: grabbing; }
  .drawblock-name { cursor: text; outline: none; padding: 1px 6px; border-radius: 4px; color: var(--fg); }
  .drawblock-name:hover, .drawblock-name:focus { background: var(--rule); }
  .drawblock.dragging { opacity: .4; }
  .drag-indicator { position: fixed; height: 3px; background: var(--accent); border-radius: 2px;
    z-index: 45; display: none; pointer-events: none; box-shadow: 0 0 0 1px rgba(176,125,46,.3); }
  body.dragging-block, body.dragging-block * { cursor: grabbing !important; user-select: none !important; }

  /* expanded overlay */
  #overlay { position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.45);
    display: none; flex-direction: column; }
  #overlay.show { display: flex; }
  #overlay-bar { height: 46px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px; background: var(--bg); border-bottom: 1px solid var(--rule); }
  #overlay-bar .ttl { font-size: 13px; color: var(--muted); cursor: text; outline: none;
    padding: 2px 7px; border-radius: 4px; max-width: 55vw; overflow: hidden; white-space: nowrap; }
  #overlay-bar .ttl:hover, #overlay-bar .ttl:focus { background: var(--rule); color: var(--fg); }
  #overlay-canvas { flex: 1; min-height: 0; background: var(--bg); }
  /* Excalidraw hides tool number shortcuts at narrow widths — force them back on */
  .excalidraw .ToolIcon__keybinding { display: block !important; }
  .gram-underline { text-decoration: underline wavy var(--accent); text-decoration-skip-ink: none;
    text-underline-offset: 3px; cursor: pointer; }

      { tag: tags.heading1, fontWeight: "700", fontSize: "1.35em" },
      { tag: tags.heading2, fontWeight: "700", fontSize: "1.18em" },

      { tag: tags.emphasis, fontStyle: "italic" },

    }

    // ---------- scene store ----------
    // scenes: id -> { elements, appState, files }
    const scenes = new Map();
    const thumbVersion = new Map(); // id -> int, bumped when a scene changes
    const collapsed = new Set(); // ids folded down to just their title bar
    function bump(id) { thumbVersion.set(id, (thumbVersion.get(id) || 0) + 1); }

    const sheets = new Map(); // id -> { name, rows, cols, cells:[[...]] }
    function makeSheetId() { return "sh" + Date.now().toString(36) + Math.random().toString(36).slice(2, 5); }
    function newSheet() { const rows = 4, cols = 3; return { name: "", rows, cols, cells: Array.from({ length: rows }, () => Array(cols).fill("")), formats: {}, colWidths: Array(cols).fill(96) }; }

    let docTags = []; // tags for the current note — ride inside the .cat so they sync + work offline
    function serialize() {
      const s = {};

        s[id] = {
          elements: sc.elements || [],
          appState: { viewBackgroundColor: sc.appState?.viewBackgroundColor || "#ffffff" },
          files: sc.files || {},
          name: sc.name || "",
        };
      }
      const sh = {};
      for (const id of docSheetIds()) { const s = sheets.get(id); if (s) sh[id] = { name: s.name || "", rows: s.rows, cols: s.cols, cells: s.cells, formats: s.formats || {}, colWidths: s.colWidths || [] }; }
      return { version: 1, text: view.state.doc.toString(), scenes: s, sheets: sh, tags: docTags };
    }
    let saveTimer = null;
    function scheduleSave() { clearTimeout(saveTimer); saveTimer = setTimeout(() => {
      try { localStorage.setItem(LS_KEY, JSON.stringify(serialize())); } catch (e) { console.warn("save", e); }

    }, 500); }

    function loadFromData(data) {
      scenes.clear();
      if (data?.scenes) for (const id of Object.keys(data.scenes)) { scenes.set(id, data.scenes[id]); bump(id); }
      sheets.clear();
      if (data?.sheets) for (const id of Object.keys(data.sheets)) {

        const cells = s.cells || [];

    }

    let initialText = "# Welcome to Scribe 👋\n\nA calm place to write — it saves as you type.\n\nA few things you can do:\n\n- Just **start writing** (this text is yours to delete).\n- Type `/` on a new line for tasks, drawings, tables, and snippets.\n- Select text to **format** it, or to proofread / make a task.\n- **Sign in** (top right) to save your notes to the cloud and reach them anywhere.\n- The **menu** (the icon in the top-left) has Save, Open, Export, themes, and the guide.\n\nHappy writing.\n";

    const setLints = StateEffect.define();

    function harperToCommon(l) {

        return { from: s.start, to: s.end, message, suggestions };

    async function languageToolLint(text) {
      const params = new URLSearchParams();
      params.append("text", text);
      params.append("language", "en-US");
      const r = await fetch(ltUrl, { method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: params.toString() });
      if (!r.ok) throw new Error("LT " + r.status);
      const data = await r.json();
      return (data.matches || []).map(m => ({
        from: m.offset, to: m.offset + m.length,
        message: m.message || "Issue",
        suggestions: (m.replacements || []).map(x => x.value).filter(Boolean).slice(0, 5),
      }));
    }

    async function runLint() {
      if (draftMode()) { view.dispatch({ effects: setLints.of([]) }); return; } // Draft mode: no grammar checking
      const text = view.state.doc.toString();
      const seq = ++lintSeq;
      let raw;
      try {
        if (engine === "languagetool") raw = await languageToolLint(text);
        else if (harperReady && harperLinter) raw = (await harperLinter.lint(text)).map(harperToCommon).filter(Boolean);
        else return;
      } catch (e) {
        if (seq !== lintSeq) return;
        if (engine === "languagetool") {
          // LanguageTool went away mid-session — fall back to Harper automatically
          engine = "harper";
          toast("LanguageTool unavailable — using Harper");
          if (harperReady) runLint(); else initHarper();
          return;
        }
        console.warn("lint", e); currentLints = []; view.dispatch({ effects: setLints.of([]) }); setGrammarIndicator("error");
        return;
      }
      if (seq !== lintSeq) return; // a newer edit superseded this run
      const doc = view.state.doc;
      const markerRanges = [];
      for (let i = 1; i <= doc.lines; i++) { const ln = doc.line(i); if (MARKER.test(ln.text)) markerRanges.push([ln.from, ln.to]); }
      const codeRanges = codeTemplateRanges(text);
      const mapped = raw.filter(l => {
        if (!l || l.from == null || l.to == null || l.to <= l.from || l.to > doc.length) return false;
        if (markerRanges.some(([a, b]) => l.from < b && l.to > a)) return false; // drawings/sheets
        if (codeRanges.some(([a, b]) => l.from < b && l.to > a)) return false;    // code & template spans
        const t = doc.sliceString(l.from, l.to);
        if (dictionary.has(t.trim().toLowerCase())) return false;                 // personal dictionary
        if (ignoredLints.has(lintKey(l.message, t))) return false;                // dismissed suggestions

    // count cells showing a calculation error across all sheets (we flag, never silently rewrite the math)
    function docSheetIds() {

      while ((m = re.exec(doc))) ids.add(m[1]);

    function countSheetErrors() {

        toast(sheetErr ? calcIssueMsg(sheetErr) : "Nothing to auto-fix");
        return;
      }
      const changes = []; let lastFrom = Infinity; const applied = [];
      for (const l of fixable) {

        const before = view.state.doc.sliceString(l.from, l.to);

    async function checkLtHealth() {

    // ---------- tasks: markdown checkbox lines rendered as clickable boxes ----------
    const TASK_RE = /^(\s*)[-*+] \[([ xX])\] /;

    class CheckboxWidget extends WidgetType {
      constructor(checked, statusPos) { super(); this.checked = checked; this.statusPos = statusPos; }
      eq(o) { return o.checked === this.checked && o.statusPos === this.statusPos; }
      ignoreEvent() { return true; }
      toDOM() {
        const box = document.createElement("span");
        box.className = "task-check" + (this.checked ? " done" : "");
        const pos = this.statusPos;
        box.addEventListener("mousedown", (e) => { e.preventDefault(); toggleTaskStatus(pos); });
        return box;
      }
    }
    function toggleTaskStatus(pos) {
      if (pos < 0 || pos >= view.state.doc.length) return;
      const ch = view.state.doc.sliceString(pos, pos + 1);
      view.dispatch({ changes: { from: pos, to: pos + 1, insert: (ch === "x" || ch === "X") ? " " : "x" } });
      scheduleSave();

    function buildTasks(state) {
      const deco = new RangeSetBuilder();
      const atoms = new RangeSetBuilder();
      for (let i = 1; i <= state.doc.lines; i++) {
        const line = state.doc.line(i);
        const m = TASK_RE.exec(line.text);
        if (!m) continue;
        const start = line.from + m[1].length; // the bullet char
        const status = start + 3;              // char between [ ]
        const checked = m[2] !== " ";
        if (checked) {
          // completed → recede into plain text: hide the whole "- [x] " marker, no tint, no strike
          deco.add(start, start + 6, Decoration.replace({}));
          atoms.add(start, start + 6, Decoration.replace({}));
        } else {
          deco.add(line.from, line.from, Decoration.line({ class: "task-line" }));
          deco.add(start, start + 5, Decoration.replace({ widget: new CheckboxWidget(false, status) }));
          atoms.add(start, start + 5, Decoration.replace({}));
        }

      return { deco: deco.finish(), atoms: atoms.finish() };

    const taskField = StateField.define({
      create(state) { return buildTasks(state); },
      update(v, tr) { return tr.docChanged ? buildTasks(tr.state) : v; },
      provide: f => EditorView.decorations.from(f, v => v.deco),
    });

    function convertSelectionToTask() {
      const sel = view.state.selection.main;
      const doc = view.state.doc;
      const fromLine = doc.lineAt(sel.from), toLine = doc.lineAt(sel.to);
      const changes = [];
      for (let i = fromLine.number; i <= toLine.number; i++) {
        const line = doc.line(i);
        if (line.text.trim() === "" || TASK_RE.test(line.text)) continue;
        const m = /^(\s*)(?:[-*+] )?(.*)$/.exec(line.text);
        changes.push({ from: line.from, to: line.to, insert: m[1] + "- [ ] " + m[2] });
      }
      if (!changes.length) { toast("Select some text to make a task"); return; }
      view.dispatch({ changes });
      scheduleSave();
      hideFmtBar();
      toast(changes.length === 1 ? "Made a task" : "Made " + changes.length + " tasks");
    }
    function wrapSel(prefix, suffix) {
      const sel = view.state.selection.main; if (sel.empty) return;
      const text = view.state.sliceDoc(sel.from, sel.to);
      view.dispatch({ changes: { from: sel.from, to: sel.to, insert: prefix + text + suffix }, selection: { anchor: sel.from + prefix.length, head: sel.from + prefix.length + text.length } });
      view.focus(); scheduleSave();
    }
    function lineToggle(prefix) {
      const sel = view.state.selection.main, doc = view.state.doc;
      const a = doc.lineAt(sel.from).number, b = doc.lineAt(sel.to).number;
      const changes = [];
      for (let i = a; i <= b; i++) { const line = doc.line(i); if (line.text.trim() === "" && a !== b) continue; const has = line.text.startsWith(prefix); changes.push(has ? { from: line.from, to: line.from + prefix.length, insert: "" } : { from: line.from, insert: prefix }); }
      view.dispatch({ changes }); view.focus(); scheduleSave();
    }
    function insertLink() {
      const sel = view.state.selection.main; const text = sel.empty ? "" : view.state.sliceDoc(sel.from, sel.to);
      const url = prompt("Link URL:", "https://"); if (!url) return;
      const label = text || (prompt("Link text:", "") || url);

      view.dispatch({ changes: { from: sel.from, to: sel.to, insert: ins }, selection: { anchor: sel.from + ins.length } });
      view.focus(); scheduleSave();
    }
    // Scribe writes in Markdown. One format set; copy transforms per target at copy time (see copyAs).
    const FORMAT_BTNS = [
      { html: "<b>B</b>", title: "Bold (⌘B)", run: () => wrapSel("**","**") },
      { html: "<i>I</i>", title: "Italic (⌘I)", run: () => wrapSel("*","*") },
      { html: "<s>S</s>", title: "Strikethrough", run: () => wrapSel("~~","~~") },
      { html: "&lt;/&gt;", title: "Inline code", run: () => wrapSel("`","`") },
      "sep",
      { html: "H1", title: "Heading 1", run: () => lineToggle("# ") },
      { html: "H2", title: "Heading 2", run: () => lineToggle("## ") },
      { html: "&bull;", title: "Bullet list", run: () => lineToggle("- ") },

      { html: "&gt;", title: "Quote", run: () => lineToggle("> ") },

    function buildFmtInto(el) {

        const b = document.createElement("button"); b.innerHTML = it.html; b.title = it.title;

    function renderToolbars() {

    function updateFmtBar() {

    // Copy as… — you write once in Markdown; these transform it only at copy time (best-effort).
    function mdToPlain(s) {
      return s
        .replace(/\*\*([^*]+)\*\*/g, "$1").replace(/(^|[^*])\*([^*\n]+)\*/g, "$1$2")
        .replace(/__([^_]+)__/g, "$1").replace(/~~([^~]+)~~/g, "$1")
        .replace(/`{1,3}([^`]+)`{1,3}/g, "$1")
        .replace(/^#{1,6}\s+/gm, "").replace(/^(\s*)[-*+]\s+/gm, "$1• ").replace(/^\s*>\s?/gm, "");
    }
    // Italic runs BEFORE bold: the italic regex requires a non-"*" before its "*", so it skips inside **bold**.
    function mdToWhatsApp(s) {
      return s
        .replace(/(^|[^*])\*([^*\n]+)\*/g, "$1_$2_")          // *italic* -> _italic_
        .replace(/\*\*([^*]+)\*\*/g, "*$1*")                  // **bold** -> *bold*
        .replace(/__([^_]+)__/g, "_$1_")                      // __italic__ -> _italic_
        .replace(/~~([^~]+)~~/g, "~$1~")                      // ~~strike~~ -> ~strike~
        .replace(/`([^`]+)`/g, "$1")                          // drop inline code marks (WA mono is ```)
        .replace(/^#{1,6}\s+/gm, "").replace(/^(\s*)[-*+]\s+/gm, "$1• ").replace(/^\s*>\s?/gm, "");
    }
    function mdToTelegram(s) {
      return s
        .replace(/(^|[^*])\*([^*\n]+)\*/g, "$1__$2__")        // *italic* -> __italic__  (**bold** kept as-is)
        .replace(/^#{1,6}\s+/gm, "").replace(/^(\s*)[-*+]\s+/gm, "$1• ");
    }
    async function copyAs(dest) {
      const src = docForShare();
      if (!src.trim()) { toast("Nothing to copy"); return; }
      try {
        if (dest === "gmail") {
          const marked = (await import("https://esm.sh/marked@12")).marked;
          marked.setOptions({ gfm: true });
          const html = marked.parse(src);
          if (window.ClipboardItem && navigator.clipboard?.write) {
            await navigator.clipboard.write([new ClipboardItem({ "text/html": new Blob([html], { type: "text/html" }), "text/plain": new Blob([src], { type: "text/plain" }) })]);
            toast("Copied for Gmail (rich)");
          } else { fallbackCopy(src); toast("Copied"); }
          return;
        }
        const out = dest === "whatsapp" ? mdToWhatsApp(src)
          : dest === "telegram" ? mdToTelegram(src)
          : dest === "plain" ? mdToPlain(src)
          : src; // markdown verbatim
        if (navigator.clipboard?.writeText) await navigator.clipboard.writeText(out); else fallbackCopy(out);
        const lbl = { md: "Markdown", whatsapp: "WhatsApp", telegram: "Telegram", plain: "plain text" }[dest] || dest;
        toast("Copied — " + lbl);
      } catch { fallbackCopy(src); toast("Copied"); }
    }

    function listTasks() {
      const doc = view.state.doc; const out = [];
      for (let i = 1; i <= doc.lines; i++) {
        const line = doc.line(i);
        const m = /^(\s*)[-*+] \[([ xX])\] (.*)$/.exec(line.text);
        if (m) out.push({ from: line.from, checked: m[2] !== " ", text: m[3], statusPos: line.from + m[1].length + 3 });

      return out;
    }
    function renderTasksPanel() {
      const listEl = document.getElementById("tasksList");
      const tasks = listTasks();
      const open = tasks.filter(t => !t.checked), done = tasks.filter(t => t.checked);
      document.getElementById("tasksCount").textContent = open.length + " open" + (done.length ? " · " + done.length + " done" : "");
      const showDone = document.getElementById("tasksShowDone").checked;
      const shown = showDone ? tasks : open;
      listEl.innerHTML = "";
      if (!shown.length) {
        const li = document.createElement("li"); li.className = "tk-empty";
        li.textContent = tasks.length ? "All done 🎉" : "No tasks yet — type /task, or select text and press ⌘↵";
        listEl.appendChild(li); return;
      }
      for (const t of shown) {
        const li = document.createElement("li");
        const box = document.createElement("span"); box.className = "task-check" + (t.checked ? " done" : "");
        box.addEventListener("mousedown", (e) => { e.preventDefault(); toggleTaskStatus(t.statusPos); });
        const txt = document.createElement("span"); txt.className = "tk-text" + (t.checked ? " done" : ""); txt.textContent = t.text || "(empty task)";
        txt.addEventListener("click", () => { view.dispatch({ selection: { anchor: t.from }, effects: EditorView.scrollIntoView(t.from, { y: "center" }) }); view.focus(); });
        li.appendChild(box); li.appendChild(txt); listEl.appendChild(li);
      }
    }
    function toggleTasksPanel() {
      tasksPanelOpen = !tasksPanelOpen;
      document.getElementById("tasksPanel").classList.toggle("show", tasksPanelOpen);
      if (tasksPanelOpen) renderTasksPanel();
    }

    const editorTheme = EditorView.theme({
      "&": { fontSize: "16px" },
      ".cm-content": { lineHeight: "1.7" },
    });

    const view = new EditorView({
      parent: document.getElementById("editor"),
      state: EditorState.create({
        doc: initialText,
        extensions: [
          history(),
          drawSelection(),
          markdown(),
          highlightCompartment.of(MD_HIGHLIGHT),
          editorTheme,
          drawField,
          EditorView.atomicRanges.of(v => v.state.field(drawField)),
          sheetField,
          EditorView.atomicRanges.of(v => v.state.field(sheetField)),
          lintField,
          readField,
          taskField,
          EditorView.atomicRanges.of(v => v.state.field(taskField).atoms),
          EditorView.lineWrapping,
          keymap.of([
            { key: "ArrowDown", run: () => slashOpen ? (moveSlash(1), true) : false },
            { key: "ArrowUp", run: () => slashOpen ? (moveSlash(-1), true) : false },
            { key: "Tab", run: (v) => slashOpen ? (acceptSlash(), true) : indentLines(v, false) },
            { key: "Shift-Tab", run: (v) => indentLines(v, true) },
            { key: "Escape", run: () => slashOpen ? (closeSlash(), true) : false },
            { key: "Enter", run: (v) => slashOpen ? (acceptSlash(), true) : handleSlashCommand(v) },
            { key: "Mod-Enter", preventDefault: true, run: () => { convertSelectionToTask(); return true; } },
            { key: "Mod-b", preventDefault: true, run: () => { wrapSel("**", "**"); return true; } },
            { key: "Mod-i", preventDefault: true, run: () => { wrapSel("*", "*"); return true; } },
            { key: "Backspace", run: (v) => deleteBlockAtCursor(v, false) },
            { key: "Delete", run: (v) => deleteBlockAtCursor(v, true) },
            ...defaultKeymap,
            ...historyKeymap,
            { key: "Mod-s", run: () => { saveFile(); return true; } },
            { key: "Mod-o", preventDefault: true, run: () => { openFile(); return true; } },
          ]),
          EditorView.updateListener.of((u) => {
            if (u.docChanged) { setDirty(true); scheduleSave(); scheduleLint(); scheduleRead(); hideGramPopover(); }
            if (u.selectionSet || u.docChanged) updateFmtBar();
            if (u.selectionSet || u.docChanged) updateSlashMenu();
            if (u.docChanged && tasksPanelOpen) renderTasksPanel();
          }),
          EditorView.contentAttributes.of({ spellcheck: "true", autocapitalize: "sentences", lang: "en" }),
        ],
      }),
    });

    // ---------- insert / delete blocks ----------
    // Slash command: "/draw" alone on a line + Enter inserts a drawing block here.
    // Tab / Shift-Tab indentation — adds/removes 2 leading spaces on the current line(s).
    // Works uniformly for prose, lists, and tasks (nested checkboxes render from the leading space).
    function indentLines(cmView, outdent) {
      const { state } = cmView;
      const sel = state.selection.main;
      const startLn = state.doc.lineAt(sel.from).number, endLn = state.doc.lineAt(sel.to).number;
      const changes = [];
      for (let i = startLn; i <= endLn; i++) {
        const line = state.doc.line(i);
        if (outdent) {
          const m = /^( {1,2}|\t)/.exec(line.text);
          if (m) changes.push({ from: line.from, to: line.from + m[0].length, insert: "" });
        } else {
          changes.push({ from: line.from, insert: "  " });
        }
      }
      if (!changes.length) return outdent; // nothing to outdent → let default Tab pass only on indent
      cmView.dispatch({ changes });
      scheduleSave();
      return true;
    }
    function handleSlashCommand(cmView) {
      const sel = cmView.state.selection.main;
      if (!sel.empty) return false;
      const line = cmView.state.doc.lineAt(sel.head);
      // /task ... → a checkbox task line
      const tm = /^(\s*)\/task\b[ ]?(.*)$/i.exec(line.text);
      if (tm) {
        const insert = tm[1] + "- [ ] " + tm[2];
        cmView.dispatch({ changes: { from: line.from, to: line.to, insert }, selection: { anchor: line.from + insert.length } });
        scheduleSave();
        return true;
      }
      if (/^\s*\/sheet\s*$/i.test(line.text)) {
        const sid = makeSheetId(); sheets.set(sid, newSheet());
        const marker = "⟦sheet:" + sid + "⟧";
        cmView.dispatch({ changes: { from: line.from, to: line.to, insert: marker + "\n" }, selection: { anchor: line.from + marker.length + 1 } });
        scheduleSave();
        return true;
      }
      if (!/^\s*\/draw\s*$/i.test(line.text)) return false;
      const id = makeId();
      scenes.set(id, { elements: [], appState: { viewBackgroundColor: "#ffffff" }, files: {} });
      bump(id);
      const marker = "⟦draw:" + id + "⟧";
      cmView.dispatch({
        changes: { from: line.from, to: line.to, insert: marker + "\n" },
        selection: { anchor: line.from + marker.length + 1 },
      });
      scheduleSave();
      setTimeout(() => openOverlay(id), 30);
      return true;
    }

    function deleteBlock(id) {
      const doc = view.state.doc;
      for (let i = 1; i <= doc.lines; i++) {
        const line = doc.line(i);
        const m = MARKER.exec(line.text);
        if (m && m[1] === id) {
          const from = line.from;
          let to = line.to;
          if (to < doc.length) to += 1; // consume trailing newline
          view.dispatch({ changes: { from, to, insert: "" } });
          scenes.delete(id);
          scheduleSave();
          toast("Drawing deleted");
          return;
        }
      }
    }

    // ---------- snippets (pure Ghost-style copy; global across all .cat files) ----------
    const SNIP_KEY = "scribeNext.snippets";
    const DRAW_RE = /⟦draw:([a-z0-9]+)⟧/g;
    function loadSnippets() { try { return JSON.parse(localStorage.getItem(SNIP_KEY) || "{}"); } catch { return {}; } }
    function saveSnippets(o) { try { localStorage.setItem(SNIP_KEY, JSON.stringify(o)); } catch (e) { console.warn("snip save", e); } if (typeof scheduleUserDataSync === "function") scheduleUserDataSync(); }
    function snippetType(s) {
      const t = s.text || "";
      if (/⟦draw:[a-z0-9]+⟧/.test(t)) return "drawing";
      if (/^\s*[-*+] \[[ xX]\] /m.test(t)) return "task";
      return "text";
    }
    const TYPE_META = { text: { ico: "⌨", tag: "Text" }, task: { ico: "✓", tag: "Task" }, drawing: { ico: "✎", tag: "Drawing" }, sheet: { ico: "▦", tag: "Sheet" }, manage: { ico: "⚙", tag: "Manage" } };
    function snippetPreview(s) {
      let t = (s.text || "").replace(DRAW_RE, (m, id) => "🖼 " + ((s.scenes && s.scenes[id] && s.scenes[id].name) || "drawing"));
      return t.replace(/\s+/g, " ").trim();
    }
    function deepScene(src) {
      return JSON.parse(JSON.stringify({
        elements: src.elements || [],
        appState: { viewBackgroundColor: (src.appState && src.appState.viewBackgroundColor) || "#ffffff" },
        files: src.files || {}, name: src.name || "",
      }));
    }

    // Save the current selection (text + any whole drawings inside it) as a named snippet.
    function captureSnippet() {
      const sel = view.state.selection.main;
      if (sel.empty || !view.state.sliceDoc(sel.from, sel.to).trim()) { toast("Select something to save first"); return; }
      const text = view.state.sliceDoc(sel.from, sel.to);
      const sceneObj = {};
      text.replace(DRAW_RE, (m, id) => { const sc = scenes.get(id); if (sc) sceneObj[id] = deepScene(sc); return m; });
      let nick = prompt("Snippet name — you'll type /name to paste it:", "");
      if (nick == null) return;
      nick = nick.trim().toLowerCase().replace(/[^a-z0-9-]/g, "");
      if (!nick) { toast("Need a name"); return; }
      if (["draw", "task", "snippet", "snippets"].includes(nick)) { toast('"' + nick + '" is reserved'); return; }
      const all = loadSnippets();
      if (all[nick] && !confirm('Replace existing snippet "/' + nick + '"?')) return;
      all[nick] = { name: nick, text, scenes: sceneObj, created: (all[nick] && all[nick].created) || Date.now(), used: (all[nick] && all[nick].used) || 0, last: Date.now() };
      saveSnippets(all);
      toast("Snippet /" + nick + " saved");
      if (document.getElementById("snipPanel").classList.contains("show")) renderSnipPanel();
    }

    // Paste a snippet at [from,to], cloning any drawings to fresh ids so they edit independently.
    function insertSnippet(snip, from, to) {
      const src = snip.scenes || {};
      const text = (snip.text || "").replace(DRAW_RE, (m, oldId) => {
        const sc = src[oldId]; if (!sc) return m;
        const nid = makeId(); scenes.set(nid, deepScene(sc)); bump(nid);
        return "⟦draw:" + nid + "⟧";
      });
      view.dispatch({ changes: { from, to, insert: text }, selection: { anchor: from + text.length } });
      view.dispatch({ effects: refreshDraw.of(null) });
      const all = loadSnippets();
      if (all[snip.name]) { all[snip.name].used = (all[snip.name].used || 0) + 1; all[snip.name].last = Date.now(); saveSnippets(all); }
      scheduleSave(); view.focus();
    }

    // ----- the unified "/" picker (built-ins + snippets) -----
    const BUILTINS = [
      { kind: "cmd", nick: "snippet", type: "manage", preview: "open the snippet manager" },
      { kind: "cmd", nick: "draw", type: "drawing", preview: "insert a drawing block" },
      { kind: "cmd", nick: "sheet", type: "sheet", preview: "a calculating table / mini-sheet" },
      { kind: "cmd", nick: "task", type: "task", preview: "a checkbox task" },
    ];
    let slashOpen = false, slashItems = [], slashIndex = 0;
    function currentSlashQuery() {
      const sel = view.state.selection.main;
      if (!sel.empty) return null;
      const line = view.state.doc.lineAt(sel.head);
      if (sel.head !== line.to) return null; // only when cursor is at end of the line
      const m = /^(\s*)\/(\S*)$/.exec(line.text);
      if (!m) return null;
      return { q: m[2], lineFrom: line.from, lineTo: line.to };
    }
    function slashCandidates(q) {
      q = (q || "").toLowerCase();
      const all = loadSnippets();
      const snips = Object.values(all)
        .filter(s => !q || s.name.toLowerCase().includes(q))
        .sort((a, b) => (b.last || 0) - (a.last || 0) || (b.used || 0) - (a.used || 0) || a.name.localeCompare(b.name))
        .map(s => ({ kind: "snip", nick: s.name, type: snippetType(s), preview: snippetPreview(s), snip: s }));
      const cmds = BUILTINS.filter(c => !q || c.nick.includes(q));
      return [...snips, ...cmds]; // snippets first (recency), built-ins pinned after
    }
    function renderSlashMenu() {
      const el = document.getElementById("slashMenu");
      el.innerHTML = "";
      if (!slashItems.length) {
        const e = document.createElement("div"); e.className = "sm-empty"; e.textContent = "No match — keep typing, or ⏎ for a new line";
        el.appendChild(e);
      }
      slashItems.forEach((it, i) => {
        const row = document.createElement("div"); row.className = "sm-row" + (i === slashIndex ? " sel" : "");
        const meta = TYPE_META[it.type] || TYPE_META.text;
        row.innerHTML =
          '<span class="sm-ico">' + meta.ico + '</span>' +
          '<span class="sm-main"><span class="sm-nick"><span class="sm-slash">/</span>' + esc(it.nick) + '</span>' +
          '<span class="sm-prev">' + (it.kind === "cmd" ? esc(it.preview) : esc(it.preview) || "(empty)") + '</span></span>' +
          '<span class="sm-tag">' + (it.kind === "cmd" ? (it.type === "manage" ? "Manage" : "Command") : meta.tag) + '</span>';
        row.addEventListener("mousedown", (e) => { e.preventDefault(); slashIndex = i; acceptSlash(); });
        el.appendChild(row);
      });
      const foot = document.createElement("div"); foot.className = "sm-foot"; foot.textContent = "⚙ Manage snippets…";
      foot.addEventListener("mousedown", (e) => { e.preventDefault(); closeSlash(); openSnipPanel(); });
      el.appendChild(foot);
    }
    function positionSlashMenu(headPos) {
      const el = document.getElementById("slashMenu");
      const c = view.coordsAtPos(headPos);
      if (!c) { closeSlash(); return; }
      const w = el.offsetWidth, h = el.offsetHeight;
      el.style.left = Math.max(8, Math.min(c.left, window.innerWidth - w - 8)) + "px";
      el.style.top = (c.bottom + 4 + h > window.innerHeight ? Math.max(8, c.top - h - 4) : c.bottom + 4) + "px";
    }
    function updateSlashMenu() {
      const cs = currentSlashQuery();
      if (!cs) { closeSlash(); return; }
      slashItems = slashCandidates(cs.q).slice(0, 8);
      if (cs.q && !slashItems.length) { closeSlash(); return; } // typed a non-match → stay out of the way
      if (slashIndex >= slashItems.length) slashIndex = 0;
      slashOpen = true;
      const el = document.getElementById("slashMenu");
      renderSlashMenu();
      el.classList.add("show");
      positionSlashMenu(cs.lineTo);
    }
    function moveSlash(d) { if (!slashItems.length) return; slashIndex = (slashIndex + d + slashItems.length) % slashItems.length; renderSlashMenu(); }
    function closeSlash() { slashOpen = false; slashIndex = 0; document.getElementById("slashMenu").classList.remove("show"); }
    function acceptSlash() {
      const it = slashItems[slashIndex]; const cs = currentSlashQuery();
      if (!it || !cs) { closeSlash(); return; }
      closeSlash();
      if (it.kind === "cmd") {
        if (it.type === "manage") { // /snippet → clear the line and open the manager
          view.dispatch({ changes: { from: cs.lineFrom, to: cs.lineTo, insert: "" } });
          openSnipPanel();
          return;
        }
        // normalize the line to the canonical command, then run the existing handler
        view.dispatch({ changes: { from: cs.lineFrom, to: cs.lineTo, insert: "/" + it.nick }, selection: { anchor: cs.lineFrom + 1 + it.nick.length } });
        handleSlashCommand(view);
        return;
      }
      insertSnippet(it.snip, cs.lineFrom, cs.lineTo);
    }
    window.addEventListener("mousedown", (e) => { if (slashOpen && !e.target.closest("#slashMenu") && !e.target.closest(".cm-editor")) closeSlash(); });
    // clicking anywhere outside the snippet manager tray closes it (the toggle button + the / menu's "Manage…" are excluded)
    window.addEventListener("mousedown", (e) => {
      const p = document.getElementById("snipPanel");
      if (p.classList.contains("show") && !e.target.closest("#snipPanel") && !e.target.closest("#slashMenu") && e.target.id !== "btn-snippets") closeSnipPanel();
    });

    // ----- the snippet manager panel -----
    function openSnipPanel() { document.getElementById("snipPanel").classList.add("show"); renderSnipPanel(); }
    function closeSnipPanel() { document.getElementById("snipPanel").classList.remove("show"); }
    function toggleSnipPanel() { const p = document.getElementById("snipPanel"); if (p.classList.contains("show")) closeSnipPanel(); else openSnipPanel(); }
    function renderSnipPanel() {
      const all = loadSnippets();
      const names = Object.keys(all).sort((a, b) => (all[b].last || 0) - (all[a].last || 0) || a.localeCompare(b));
      document.getElementById("snipCount").textContent = names.length ? names.length + (names.length === 1 ? " snippet" : " snippets") : "";
      const ul = document.getElementById("snipList"); ul.innerHTML = "";
      if (!names.length) {
        const li = document.createElement("li"); li.className = "tk-empty";
        li.innerHTML = "No snippets yet.<br>Select text/tasks/a drawing → tap <b>❏</b> in the format bar to save one.<br>Then type <b>/name</b> in the doc to paste it.";
        ul.appendChild(li); return;
      }
      for (const nm of names) {
        const s = all[nm], meta = TYPE_META[snippetType(s)] || TYPE_META.text;
        const li = document.createElement("li");
        const top = document.createElement("div"); top.className = "sn-top";
        top.innerHTML = '<span class="sn-nick"><b>/' + esc(nm) + '</b></span><span class="sn-tag">' + meta.ico + " " + meta.tag + '</span>';
        const prev = document.createElement("div"); prev.className = "sn-prev"; prev.textContent = snippetPreview(s) || "(empty)";
        const acts = document.createElement("div"); acts.className = "sn-acts";
        const ins = mkBtn("Insert", () => { const sel = view.state.selection.main; insertSnippet(s, sel.from, sel.to); });
        const edit = mkBtn("Edit", () => toggleEdit());
        const ren = mkBtn("Rename", () => renameSnippet(nm));
        const del = mkBtn("Delete", () => { if (confirm('Delete snippet "/' + nm + '"?')) { const a = loadSnippets(); delete a[nm]; saveSnippets(a); renderSnipPanel(); } });
        del.style.color = "var(--danger, #c0392b)";
        acts.append(ins, edit, ren, del);
        li.append(top, prev, acts);
        let editing = false, ta = null, saveBtn = null;
        function toggleEdit() {
          if (editing) { if (ta) ta.remove(); if (saveBtn) saveBtn.remove(); ta = saveBtn = null; editing = false; edit.textContent = "Edit"; return; }
          editing = true; edit.textContent = "Cancel";
          ta = document.createElement("textarea"); ta.value = s.text || "";
          saveBtn = mkBtn("Save", () => {
            const a = loadSnippets(); if (a[nm]) { a[nm].text = ta.value; a[nm].last = Date.now(); saveSnippets(a); }
            toast("Updated /" + nm + " — future pastes use the new text"); renderSnipPanel();
          });
          saveBtn.style.marginTop = "6px";
          li.append(ta, saveBtn); ta.focus();
        }
        ul.appendChild(li);
      }
    }
    function renameSnippet(oldName) {
      let nn = prompt("Rename /" + oldName + " to:", oldName);
      if (nn == null) return;
      nn = nn.trim().toLowerCase().replace(/[^a-z0-9-]/g, "");
      if (!nn || nn === oldName) return;
      if (["draw", "task", "snippet", "snippets"].includes(nn)) { toast('"' + nn + '" is reserved'); return; }
      const a = loadSnippets();
      if (a[nn] && !confirm('"/' + nn + '" exists — overwrite it?')) return;
      a[nn] = { ...a[oldName], name: nn, last: Date.now() }; delete a[oldName]; saveSnippets(a); renderSnipPanel();
    }
    function mkBtn(label, fn) { const b = document.createElement("button"); b.className = "btn"; b.textContent = label; b.addEventListener("click", fn); return b; }
    function esc(s) { return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

    // ---------- excalidraw overlay ----------
    let overlayRoot = null;
    let overlayApi = null;
    let overlayId = null;
    let overlayName = "";
    const overlayEl = document.getElementById("overlay");

    function openOverlay(id) {
      overlayId = id;
      const sc = scenes.get(id) || { elements: [], appState: { viewBackgroundColor: "#ffffff" }, files: {} };
      overlayName = (sc.name || "").trim();
      const titleEl = document.getElementById("overlay-ttl");
      titleEl.textContent = overlayName || "Drawing";
      titleEl.oninput = () => { overlayName = titleEl.textContent.trim(); };
      titleEl.onkeydown = (e) => { if (e.key === "Enter") { e.preventDefault(); titleEl.blur(); } };
      overlayEl.classList.add("show");
      overlayApi = null;
      overlayRoot = ReactDOM.createRoot(document.getElementById("overlay-canvas"));
      overlayRoot.render(React.createElement(Excalidraw.Excalidraw, {
        theme: currentExcalTheme(),
        initialData: {
          elements: sc.elements || [],
          appState: { viewBackgroundColor: sc.appState?.viewBackgroundColor || "#ffffff" },
          files: sc.files || {},
          scrollToContent: true,
        },
        excalidrawAPI: (api) => { overlayApi = api; },
      }));
    }

    function closeOverlay(save) {
      if (save && overlayApi && overlayId) {
        const id = overlayId;
        const elements = overlayApi.getSceneElements();
        const appState = overlayApi.getAppState();
        const files = overlayApi.getFiles();
        scenes.set(id, {
          elements: JSON.parse(JSON.stringify(elements)),
          appState: { viewBackgroundColor: appState.viewBackgroundColor || "#ffffff" },
          files: files || {},
          name: overlayName,
        });
        bump(id);
        view.dispatch({ effects: refreshDraw.of(null) }); // re-render the inline thumbnail
        scheduleSave();
      }
      if (overlayRoot) { overlayRoot.unmount(); overlayRoot = null; }
      overlayApi = null; overlayId = null;
      overlayEl.classList.remove("show");
      view.focus();
    }

    document.getElementById("overlay-done").addEventListener("click", () => closeOverlay(true));
    document.getElementById("overlay-cancel").addEventListener("click", () => closeOverlay(false));

    // ---------- file save / open ----------
    const fsaSupported = "showSaveFilePicker" in window;
    let fileHandle = null;
    let curName = "untitled.kitten"; // .kitten = newborn/unsaved, .cat = saved
    function catName(n) { return (n || "untitled").replace(/\.(kitten|cat|scribe|json)$/i, "") + ".cat"; }

    async function saveFile() {
      const data = JSON.stringify(serialize(), null, 0);
      try { localStorage.setItem(LS_KEY, data); } catch {}
      if (!fsaSupported) {
        const blob = new Blob([data], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob); a.download = catName(curName); a.click();
        URL.revokeObjectURL(a.href);
        curName = catName(curName); document.getElementById("filename").textContent = curName;
        setDirty(false); toast("Saved 🐈"); return;
      }
      try {
        if (!fileHandle) {
          fileHandle = await window.showSaveFilePicker({
            suggestedName: catName(curName),
            types: [{ description: "Cat note", accept: { "application/json": [".cat"] } }],
          });
          curName = fileHandle.name; document.getElementById("filename").textContent = curName;
        }
        const w = await fileHandle.createWritable();
        await w.write(data); await w.close();
        setDirty(false); toast("Saved");
      } catch (e) { if (e.name !== "AbortError") toast("Save failed"); }
    }

    async function openFile() {
      if (!fsaSupported) { toast("Open needs Chrome/Edge"); return; }
      try {
        const [h] = await window.showOpenFilePicker({
          types: [{ description: "Cat note", accept: { "application/json": [".cat", ".kitten", ".scribe"] } }],
        });
        const file = await h.getFile();
        const data = JSON.parse(await file.text());
        const text = loadFromData(data);
        fileHandle = h; curName = h.name;
        if (typeof setCloudId === "function") setCloudId(null); // a disk file isn't tied to a cloud doc
        document.getElementById("filename").textContent = curName;
        view.dispatch({ changes: { from: 0, to: view.state.doc.length, insert: text }, effects: refreshDraw.of(null) });
        setDirty(false); toast("Opened " + curName);
      } catch (e) { if (e.name !== "AbortError") { toast("Open failed"); console.warn(e); } }
    }

    document.getElementById("fileBtn").addEventListener("click", (e) => { e.stopPropagation(); toggleFileMenu(); });

    // Capability check for browser on-device AI (Chrome built-in / Gemini Nano): emerging global classes + older window.ai namespace
    async function detectDeviceAI() {
      const found = [];
      for (const name of ["LanguageModel", "Proofreader", "Rewriter", "Writer", "Summarizer", "Translator", "LanguageDetector"]) {
        const C = window[name];
        if (!C) continue;
        let status = "present";
        try {
          if (typeof C.availability === "function") status = await C.availability();
          else if (typeof C.capabilities === "function") { const c = await C.capabilities(); status = (c && (c.available || c.availability)) || "present"; }
        } catch (e) { status = "err"; }
        found.push(name + ": " + status);
      }
      if (window.ai && typeof window.ai === "object") {
        const present = ["languageModel", "assistant", "summarizer", "rewriter", "writer", "proofreader", "translator"].filter(s => window.ai[s]);
        found.push("window.ai (" + (present.length ? present.join(", ") : "namespace only") + ")");
      }
      const chrome = (navigator.userAgent.match(/Chrome\/(\d+)/) || [])[1] || "?";
      return { found, chrome, android: /Android/.test(navigator.userAgent), secure: window.isSecureContext };
    }

    // ----- readability: Flesch–Kincaid grade (the same formula Hemingway/textstat use) -----
    function countSyllables(w) {
      w = w.toLowerCase().replace(/[^a-z]/g, "");
      if (!w) return 0;
      if (w.length <= 3) return 1;
      w = w.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, "").replace(/^y/, "");
      const m = w.match(/[aeiouy]{1,2}/g);
      return m ? m.length : 1;
    }
    function readWords(text) { return text.match(/[A-Za-z][A-Za-z'’]*/g) || []; }
    function fkGrade(text) {
      const words = readWords(text);
      const wc = words.length;
      if (wc < 1) return null;
      const sents = Math.max(1, (text.match(/[.!?]+(?=\s|$)/g) || []).length);
      const syll = words.reduce((s, w) => s + countSyllables(w), 0);
      return 0.39 * (wc / sents) + 11.8 * (syll / wc) - 15.59;
    }
    function segmentSentences(text) {
      const out = []; let i = 0, start = 0;
      const term = (c) => c === "." || c === "!" || c === "?";
      while (i < text.length) {
        const c = text[i];
        if (term(c)) {
          let j = i + 1; while (j < text.length && term(text[j])) j++;
          if (j >= text.length || /\s/.test(text[j])) {
            out.push([start, j]);
            while (j < text.length && /\s/.test(text[j])) j++;
            start = j; i = j; continue;
          }
        }
        if (c === "\n" && text[i + 1] === "\n") {
          if (text.slice(start, i).trim()) out.push([start, i]);
          let j = i; while (j < text.length && /\s/.test(text[j])) j++;
          start = j; i = j; continue;
        }
        i++;
      }
      if (start < text.length && text.slice(start).trim()) out.push([start, text.length]);
      return out;
    }
    function gradeLabel(g) { return g >= 17 ? "PG" : g >= 13 ? "UG" : "G" + g; }
    let readTimer = null;
    function scheduleRead() { clearTimeout(readTimer); readTimer = setTimeout(computeReadability, 450); }
    function computeReadHard() {
      const doc = view.state.doc.toString();
      const prose = doc.replace(/^[ \t]*⟦(?:draw|sheet):[a-z0-9]+⟧[ \t]*$/gm, "");
      const lvl = readLevel();
      const overall = fkGrade(prose);
      const hard = [];
      for (const [from, to] of segmentSentences(doc)) {
        const t = doc.slice(from, to);
        if (/⟦(?:draw|sheet):[a-z0-9]+⟧/.test(t) || readWords(t).length < 5) continue;
        const g = fkGrade(t);
        if (g != null && g > lvl.grade) hard.push({ from, to, grade: g });
      }
      return { overall, hard, lvl, doc };
    }
    let readPanelOpen = false;
    function computeReadability() {
      if (draftMode()) { view.dispatch({ effects: setReadDecos.of([]) }); return; } // Draft mode: no readability checking
      const r = computeReadHard();
      updateReadIndicator(r);
      view.dispatch({ effects: setReadDecos.of(readHighlightOn() ? r.hard.map(h => ({ from: h.from, to: h.to, cls: h.grade > r.lvl.grade + 4 ? "read-veryhard" : "read-hard" })) : []) });

    // ---------- focus noise (white/pink/brown — synthesized offline, no files) ----------
    let audioCtx = null, noiseSource = null, noiseGain = null;
    const sound = { track: null, playing: false };
    function ensureAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
    function makeNoiseBuffer(ctx, type) {
      const n = ctx.sampleRate * 2;
      const buffer = ctx.createBuffer(1, n, ctx.sampleRate);
      const d = buffer.getChannelData(0);
      if (type === "pink") {
        let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
        for (let i=0;i<n;i++){ const w=Math.random()*2-1;
          b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759; b2=0.96900*b2+w*0.1538520;
          b3=0.86650*b3+w*0.3104856; b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
          d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11; b6=w*0.115926; }
      } else if (type === "brown") {
        let last=0; for (let i=0;i<n;i++){ const w=Math.random()*2-1; last=(last+0.02*w)/1.02; d[i]=last*3.5; }
      } else { for (let i=0;i<n;i++) d[i]=Math.random()*2-1; } // white
      return buffer;
    }

      noiseSource.connect(noiseGain).connect(ctx.destination);

    // ---------- share / export ----------
    function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }
    function sheetToMarkdown(sheet) {
      const disp = trimGrid(displaySheet(sheet));
      if (!disp || !disp[0].length) return "";
      const esc = (v) => String(v).replace(/\|/g, "\\|").replace(/\n/g, " ");
      const header = disp[0].map(esc);
      const sep = header.map(() => "---");
      const rows = disp.slice(1).map(r => "| " + r.map(esc).join(" | ") + " |");
      return ["| " + header.join(" | ") + " |", "| " + sep.join(" | ") + " |", ...rows].join("\n");
    }
    function docForShare() {
      const sel = view.state.selection.main;
      let text = sel.empty ? view.state.doc.toString() : view.state.sliceDoc(sel.from, sel.to);
      text = text.replace(/^[ \t]*⟦draw:([a-z0-9]+)⟧[ \t]*$/gm, (m, id) => { const n = (scenes.get(id)?.name || "").trim(); return "[drawing" + (n ? ": " + n : "") + "]"; });
      text = text.replace(/^[ \t]*⟦sheet:([a-z0-9]+)⟧[ \t]*$/gm, (m, id) => { const s = sheets.get(id); return s ? "\n" + sheetToMarkdown(s) + "\n" : ""; });
      return text;
    }
    function fallbackCopy(text) { const ta = document.createElement("textarea"); ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0"; document.body.appendChild(ta); ta.select(); try { document.execCommand("copy"); } catch {} ta.remove(); }
    function sheetToPrintHTML(sheet) {
      const disp = trimGrid(displaySheet(sheet));
      if (!disp) return "";
      const name = (sheet.name || "").trim();
      const numRe = /^-?[₹$]?[\d,]+\.?\d*%?$/;
      let rows = "";
      disp.forEach((row, r) => {
        rows += "<tr>" + row.map((v, c) => {
          const f = (sheet.formats && sheet.formats[r + ":" + c]) || {};
          const tag = r === 0 ? "th" : "td";
          let style = "";
          if (f.b && r !== 0) style += "font-weight:700;";
          if (v !== "" && numRe.test(v)) style += "text-align:right;";
          return "<" + tag + (style ? ' style="' + style + '"' : "") + ">" + escapeHtml(v) + "</" + tag + ">";
        }).join("") + "</tr>";
      });
      const table = '<table class="print-sheet">' + rows + "</table>";
      return (name && name !== "sheet") ? "<figure><figcaption>" + escapeHtml(name) + "</figcaption>" + table + "</figure>" : table;
    }
    async function buildPrintHTML() {
      const marked = (await import("https://esm.sh/marked@12")).marked;
      marked.setOptions({ gfm: true });
      const lines = view.state.doc.toString().split("\n");
      let html = "", buf = [];
      const flush = () => { if (buf.length) { html += marked.parse(buf.join("\n")); buf = []; } };
      for (const line of lines) {
        const m = /^[ \t]*⟦draw:([a-z0-9]+)⟧[ \t]*$/.exec(line);
        const ms = /^[ \t]*⟦sheet:([a-z0-9]+)⟧[ \t]*$/.exec(line);
        if (m) {
          flush();
          const sc = scenes.get(m[1]);
          if (sc && (sc.elements || []).length) {
            try {
              const svg = await Excalidraw.exportToSvg({ elements: sc.elements, appState: { exportBackground: false }, files: sc.files || {} });
              const name = (sc.name || "").trim();
              html += "<figure>" + (name ? "<figcaption>" + escapeHtml(name) + "</figcaption>" : "") + svg.outerHTML + "</figure>";
            } catch (e) { console.warn("pdf draw", e); }
          }
        } else if (ms) {
          flush();
          const s = sheets.get(ms[1]);
          if (s) html += sheetToPrintHTML(s);
        } else buf.push(line);
      }
      flush();
      return html;
    }

    // ---------- paste an image: OCR to text, or insert as an annotatable drawing ----------
    let ocrWorker = null;
    async function getOcrWorker() {
      if (ocrWorker) return ocrWorker;
      toast("Loading OCR engine…");
      const tess = await import("https://esm.sh/tesseract.js@5");
      ocrWorker = await tess.createWorker("eng");
      return ocrWorker;
    }
    function blobToDataURL(blob) { return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(blob); }); }
    function imageDims(src) { return new Promise((res) => { const img = new Image(); img.onload = () => res({ w: img.naturalWidth || 400, h: img.naturalHeight || 300 }); img.onerror = () => res({ w: 400, h: 300 }); img.src = src; }); }
    function loadImg(src) { return new Promise((res, rej) => { const i = new Image(); i.onload = () => res(i); i.onerror = rej; i.src = src; }); }
    // Shrink huge pastes + re-encode to WebP (high quality), keeping the original only if it's already smaller.
    async function optimizeImage(blob) {
      const origURL = await blobToDataURL(blob);
      try {
        const img = await loadImg(origURL);
        const maxDim = 1800;
        let w = img.naturalWidth, h = img.naturalHeight;
        if (Math.max(w, h) > maxDim) { const s = maxDim / Math.max(w, h); w = Math.round(w * s); h = Math.round(h * s); }
        const canvas = document.createElement("canvas"); canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        let out = canvas.toDataURL("image/webp", 0.85);
        if (!out.startsWith("data:image/webp")) out = canvas.toDataURL("image/png");
        if (out.length < origURL.length) return { dataURL: out, w, h, mime: out.slice(5, out.indexOf(";")) };
        return { dataURL: origURL, w: img.naturalWidth, h: img.naturalHeight, mime: blob.type || "image/png" };
      } catch { return { dataURL: origURL, w: 400, h: 300, mime: blob.type || "image/png" }; }
    }

    async function ocrPaste(blob) {
      toast("Reading image…");
      try {
        const worker = await getOcrWorker();
        const { data } = await worker.recognize(blob);
        const text = (data.text || "").trim();
        if (!text) { toast("No text found in image"); return; }
        const sel = view.state.selection.main;
        view.dispatch({ changes: { from: sel.from, to: sel.to, insert: text }, selection: { anchor: sel.from + text.length } });
        const wc = (text.match(/\S+/g) || []).length;
        toast("OCR: pasted " + wc + " word" + (wc === 1 ? "" : "s"));
      } catch (err) { console.error("OCR", err); toast("OCR failed: " + (err?.message || "?")); }
    }

          strokeColor: "transparent", backgroundColor: "transparent", fillStyle: "solid", strokeWidth: 1, strokeStyle: "solid",
          roughness: 1, opacity: 100, groupIds: [], frameId: null, roundness: null, seed: 1, version: 1, versionNonce: 1,
          isDeleted: false, boundElements: null, updated: now, link: null, locked: false, status: "saved", fileId, scale: [1, 1] };
        scenes.set(id, { elements: [imgEl], appState: { viewBackgroundColor: "#ffffff" },

      const dp = Array.from({ length: n + 1 }, () => new Uint32Array(m + 1));
      for (let i = n - 1; i >= 0; i--) for (let j = m - 1; j >= 0; j--)

      while (i < n && j < m) {

        else if (dp[i + 1][j] >= dp[i][j + 1]) { out.push({ t: "del", s: A[i] }); i++; }
        else { out.push({ t: "add", s: B[j] }); j++; }
