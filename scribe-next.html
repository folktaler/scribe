      } catch (e) {
        const list = document.getElementById("cloudList"); list.innerHTML = "";
        const li = document.createElement("li"); li.className = "cl-empty"; li.textContent = "Couldn't load: " + (e.message || e); list.appendChild(li);
      }
    }
    function relTime(iso) {
      if (!iso) return ""; const d = new Date(iso), s = (new Date() - d) / 1000;
      if (s < 60) return "just now"; if (s < 3600) return Math.floor(s / 60) + "m ago"; if (s < 86400) return Math.floor(s / 3600) + "h ago";
      if (s < 604800) return Math.floor(s / 86400) + "d ago"; return d.toLocaleDateString();
    }
    function cleanBody(t) { return (t || "").replace(/⟦(?:draw|sheet):[a-z0-9]+⟧/g, " ").replace(/\s+/g, " ").trim(); }
    function matchSnippet(text, q) {
      const i = text.toLowerCase().indexOf(q); if (i < 0) return null;
      const div = document.createElement("div"); div.className = "cl-snip";
      const start = Math.max(0, i - 24); if (start > 0) div.append("…");
      div.append(document.createTextNode(text.slice(start, i)));
      const mk = document.createElement("mark"); mk.textContent = text.slice(i, i + q.length); div.append(mk);
      const end = Math.min(text.length, i + q.length + 40);
      div.append(document.createTextNode(text.slice(i + q.length, end))); if (end < text.length) div.append("…");
      return div;
    }
    function renderCloudTagBar() {
      const bar = document.getElementById("cloudTagBar"); if (!bar) return; bar.innerHTML = "";
      const set = new Set(); for (const d of cloudDocsCache) if (Array.isArray(d.tags)) for (const t of d.tags) if (typeof t === "string") set.add(t);
      const tags = [...set].sort();
      if (!tags.length) { bar.style.display = "none"; return; } bar.style.display = "flex";
      for (const t of tags) {
        const b = document.createElement("button"); b.className = "ctag" + (cloudTagFilter === t ? " sel" : ""); b.textContent = "#" + t;
        b.addEventListener("click", () => { cloudTagFilter = (cloudTagFilter === t ? null : t); renderCloudList(document.getElementById("cloudSearch").value); });
        bar.appendChild(b);
      }
    }
    function renderCloudList(query) {
      renderCloudTagBar();
      const list = document.getElementById("cloudList"); list.innerHTML = "";
      const q = (query || "").trim().toLowerCase();
      const empty = (txt) => { const li = document.createElement("li"); li.className = "cl-empty"; li.textContent = txt; list.appendChild(li); };
      if (!cloudDocsCache.length) return empty("No cloud notes yet. Use “Save to cloud” in the 🐱 menu to add one.");
      let docs = cloudDocsCache;
      if (cloudTagFilter) docs = docs.filter(d => Array.isArray(d.tags) && d.tags.includes(cloudTagFilter));
      if (q) docs = docs.filter(d => (d.name || "").toLowerCase().includes(q) || cleanBody(d.body).toLowerCase().includes(q));
      if (!docs.length) return empty(q || cloudTagFilter ? "No notes match your filter." : "No notes.");
      for (const d of docs) {
        const li = document.createElement("li"); if (d.id === currentCloudId) li.classList.add("cl-current");
        const main = document.createElement("div"); main.className = "cl-main";
        const nm = document.createElement("div"); nm.className = "cl-name"; nm.textContent = d.name || "untitled.cat";
        const dt = document.createElement("div"); dt.className = "cl-date"; dt.textContent = relTime(d.updated_at);
        main.append(nm, dt);
        if (q) { const snip = matchSnippet(cleanBody(d.body), q); if (snip) main.appendChild(snip); }
        main.addEventListener("click", () => loadCloudDoc(d.id, d.name));
        const del = document.createElement("button"); del.className = "cl-del"; del.innerHTML = "&#10005;"; del.title = "Delete from cloud";
        del.addEventListener("click", (e) => { e.stopPropagation(); deleteCloudDoc(d.id); });
        li.append(main, del); list.appendChild(li);
      }
    }
    async function loadCloudDoc(id, name) {
      if (!currentCloudId && view.state.doc.length > 40 &&
          !confirm("Open this cloud note? Your current note isn't saved to the cloud and will be replaced in the editor (it stays in your local autosave).")) return;
      try {
        const { data, error } = await supabase.from("documents").select("content,name").eq("id", id).single();
        if (error) throw error;
        const text = loadFromData(data.content || {});
        view.dispatch({ changes: { from: 0, to: view.state.doc.length, insert: text }, effects: refreshDraw.of(null) });
        setCloudId(id); curName = catName(data.name || name || "untitled");
        document.getElementById("filename").textContent = curName; fileHandle = null; setDirty(false);
        try { localStorage.setItem(LS_KEY, JSON.stringify(serialize())); } catch {}
        cloudDirty = false; renderAccount(); closeCloudPanel(); toast("Opened " + curName + " ☁");
      } catch (e) { toast("Couldn't open: " + (e.message || e)); }
    }
    async function deleteCloudDoc(id) {
      if (!confirm("Delete this note from the cloud? This can't be undone.")) return;
      try {
        const { error } = await supabase.from("documents").delete().eq("id", id);
        if (error) throw error;
        if (id === currentCloudId) setCloudId(null);
        toast("Deleted from cloud"); openFromCloud();
      } catch (e) { toast("Delete failed: " + (e.message || e)); }
    }
    document.getElementById("cloudClose").addEventListener("click", closeCloudPanel);
    document.getElementById("cloudSearch").addEventListener("input", (e) => renderCloudList(e.target.value));

    // ---------- Tags: ride inside the note (sync + offline). AI-suggest reuses existing tags to avoid sprawl. ----------
    function normTag(t) { return (t || "").trim().toLowerCase().replace(/\s+/g, "-").replace(/[^a-z0-9-]/g, "").replace(/^-+|-+$/g, "").slice(0, 30); }
    function renderTagButton() { const b = document.getElementById("btn-tags"); if (!b) return; b.style.color = docTags.length ? "var(--accent)" : ""; b.title = docTags.length ? "Tags: " + docTags.map(t => "#" + t).join(" ") : "Tags for this note"; }
    function addDocTag(t) { const n = normTag(t); if (!n || docTags.includes(n)) return false; docTags.push(n); scheduleSave(); renderTagButton(); return true; }
    function removeDocTag(t) { const i = docTags.indexOf(t); if (i >= 0) { docTags.splice(i, 1); scheduleSave(); renderTagButton(); } }
    function allKnownTags() { const s = new Set(docTags); for (const d of cloudDocsCache) if (Array.isArray(d.tags)) for (const t of d.tags) if (typeof t === "string") s.add(t); return [...s].sort(); }
    let tagMenuOutside = null;
    function closeTagMenu() { document.getElementById("tagMenu").classList.remove("show"); if (tagMenuOutside) { document.removeEventListener("mousedown", tagMenuOutside, true); tagMenuOutside = null; } }
    function positionTagMenu() {
      const el = document.getElementById("tagMenu"); if (!el.classList.contains("show")) return;
      const r = document.getElementById("btn-tags").getBoundingClientRect(), h = el.offsetHeight, w = el.offsetWidth;
      el.style.left = Math.max(8, Math.min(r.right - w, window.innerWidth - w - 8)) + "px";
      el.style.top = Math.max(8, r.top - h - 6) + "px"; // opens upward from the bottom strip
    }
    function renderTagMenu(suggested) {
      const el = document.getElementById("tagMenu"); el.innerHTML = "";
      const lab = document.createElement("div"); lab.className = "tm-label"; lab.textContent = "Tags for this note"; el.appendChild(lab);
      const tags = document.createElement("div"); tags.className = "tm-tags";
      for (const t of docTags) {
        const chip = document.createElement("span"); chip.className = "tag-chip"; chip.append("#" + t);
        const x = document.createElement("button"); x.textContent = "✕"; x.title = "Remove";
        x.addEventListener("click", () => { removeDocTag(t); renderTagMenu(suggested); });
        chip.appendChild(x); tags.appendChild(chip);
      }
      el.appendChild(tags);
      const row = document.createElement("div"); row.className = "tm-row";
      const input = document.createElement("input"); input.type = "text"; input.placeholder = "add a tag…"; input.autocomplete = "off"; input.spellcheck = false;
      const add = document.createElement("button"); add.className = "tm-add"; add.textContent = "Add";
      const doAdd = () => { if (addDocTag(input.value)) { renderTagMenu(suggested); } };
      add.addEventListener("click", doAdd);
      input.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); doAdd(); } e.stopPropagation(); });
      row.append(input, add); el.appendChild(row);
      if (aiReady) { const sug = document.createElement("button"); sug.className = "tm-suggest"; sug.textContent = "✦ Suggest tags"; sug.addEventListener("click", () => suggestTagsAI(sug)); el.appendChild(sug); }
      const fresh = (suggested || []).filter(t => !docTags.includes(t));
      if (fresh.length) {
        const wrap = document.createElement("div"); wrap.className = "tm-suggested";
        for (const t of fresh) { const b = document.createElement("button"); b.className = "sug"; b.textContent = "+ #" + t; b.addEventListener("click", () => { addDocTag(t); renderTagMenu(fresh.filter(x => x !== t)); }); wrap.appendChild(b); }
        el.appendChild(wrap);
      }
      positionTagMenu();
      setTimeout(() => { const i = document.querySelector("#tagMenu .tm-row input"); if (i && !suggested) i.focus(); }, 0);
    }
    function openTagMenu() { renderTagMenu(); document.getElementById("tagMenu").classList.add("show"); positionTagMenu();
      tagMenuOutside = (e) => { if (!e.target.closest("#tagMenu") && !e.target.closest("#btn-tags")) closeTagMenu(); }; document.addEventListener("mousedown", tagMenuOutside, true); }
    async function suggestTagsAI(btn) {
      if (!aiReady) { toast("Local AI isn't connected"); return; }
      btn.disabled = true; btn.textContent = "Thinking…";
      const text = aiCleanMarkers(view.state.doc.toString()).trim().slice(0, 4000);
      const vocab = allKnownTags();
      const prompt = "Suggest 2 to 4 short topic tags for this note. Strongly PREFER reusing these existing tags when any fit: " + (vocab.length ? vocab.join(", ") : "(none yet)") + ". Only invent a new tag for a genuinely new theme. Each tag = a single lowercase word or hyphenated-phrase, no '#'. Return JSON {\"tags\":[\"...\"]}.\n\nNote:\n" + text;
      try {
        const r = await fetch(aiUrl + "/api/generate", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: aiModel, prompt, format: "json", stream: false, options: { temperature: 0.2 } }) });
        if (!r.ok) throw new Error("generate " + r.status);
        let tags = []; try { tags = (JSON.parse((await r.json()).response).tags || []).map(normTag).filter(Boolean); } catch {}
        tags = [...new Set(tags)].filter(t => !docTags.includes(t)).slice(0, 6);
        btn.disabled = false; btn.textContent = "✦ Suggest tags";
        if (!tags.length) { toast("No new tags suggested"); return; }
        renderTagMenu(tags);
      } catch (e) { btn.disabled = false; btn.textContent = "✦ Suggest tags"; toast("Suggest failed: " + (e.message || e)); }
    }
    document.getElementById("btn-tags").addEventListener("click", () => { document.getElementById("tagMenu").classList.contains("show") ? closeTagMenu() : openTagMenu(); });

    // ---------- Phase 3: sync GLOBAL data (dictionary + snippets) via the user_data row. Merge, never clobber. ----------
    let userDataTimer = null;
    function localUserData() { return { dictionary: [...dictionary], snippets: loadSnippets() }; }
    function scheduleUserDataSync() {
      if (!supabase || !authUser) return;
      clearTimeout(userDataTimer); userDataTimer = setTimeout(pushUserData, 1500);
    }
    async function pushUserData() {
      if (!supabase || !authUser) return;
      try { await supabase.from("user_data").upsert({ user_id: authUser.id, data: localUserData() }, { onConflict: "user_id" }); }
      catch (e) { /* offline → retries on next change or 'online' */ }
    }
    async function pullUserData() {
      if (!supabase || !authUser) return;
      try {
        const { data, error } = await supabase.from("user_data").select("data").eq("user_id", authUser.id).maybeSingle();
        if (error) throw error;
        mergeUserData(data?.data || {});
      } catch (e) { /* offline → local stays; will push later */ }
    }
    function mergeUserData(cloud) {
      // dictionary: union (add-only, so union never loses a word)
      if (Array.isArray(cloud.dictionary)) {
        const before = dictionary.size;
        for (const w of cloud.dictionary) if (typeof w === "string") dictionary.add(w.toLowerCase());
        if (dictionary.size !== before) { try { localStorage.setItem("scribeNext.dictionary", JSON.stringify([...dictionary])); } catch {} scheduleLint(); }
      }
      // snippets: merge by nickname, newer (last||created) wins on conflict
      if (cloud.snippets && typeof cloud.snippets === "object") {
        const local = loadSnippets(); let changed = false;
        for (const [nick, snip] of Object.entries(cloud.snippets)) {
          const l = local[nick];
          if (!l) { local[nick] = snip; changed = true; }
          else if ((snip.last || snip.created || 0) > (l.last || l.created || 0)) { local[nick] = snip; changed = true; }
        }
        if (changed) { try { localStorage.setItem(SNIP_KEY, JSON.stringify(local)); } catch {} if (typeof snipPanelOpen !== "undefined" && snipPanelOpen && typeof renderSnipPanel === "function") renderSnipPanel(); }
      }
      pushUserData(); // converge the cloud copy (seed it if empty, add anything local had)
    }
    window.addEventListener("online", () => { if (supabase && authUser) pushUserData(); });

    window.__scribeReady = true;
    window.__scribeView = view;
    setTheme(localStorage.getItem("scribeNext.theme") || "light");
    renderToolbars();
    document.body.dataset.font = localStorage.getItem("scribeNext.font") || "lexend";
    if (roomyOn()) document.body.classList.add("roomy");
    initGrammar();
    initAI();
    initSupabase();
    initPostHog();
    computeReadability();
    if (draftMode()) setDraftMode(true);
    updateCatMood();
    view.focus();
  } catch (err) {
    showBootError((err && err.stack) ? err.stack : String(err));
    console.error(err);
  }
  </script>
  <script>
    // PWA: register the service worker (no-ops on file:// — only works over https/localhost)
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch((e) => console.warn("SW registration skipped:", e.message));
      });
    }
    // Update banner: wire the buttons always (cheap); the version check below only runs when deployed.
    window.addEventListener("load", () => {
      const r = document.getElementById("updateReload");
      const d = document.getElementById("updateDismiss");
      if (r) r.addEventListener("click", () => location.reload());
      if (d) d.addEventListener("click", () => document.getElementById("updateBanner").classList.remove("show"));
    });
    // Update awareness: compare the running build against the published one, show the banner when newer.
    (function () {
      const APP_BUILD = "e66460451345"; // replaced with the build hash at deploy; stays the token on local file://
      window.SCRIBE_BUILD = (APP_BUILD === "__" + "BUILD__") ? "local" : APP_BUILD; // exposed for About
      if (APP_BUILD === "__" + "BUILD__") return; // not deployed (local/dev) → no auto update checks
      let notified = false;
      async function checkUpdate() {
        if (notified) return;
        try {
          const r = await fetch("version.json", { cache: "no-store" });
          if (!r.ok) return;
          const v = await r.json();
          if (v && v.build && v.build !== APP_BUILD) {
            notified = true;
            document.getElementById("updateBanner").classList.add("show");
          }
        } catch (e) { /* offline or no version file — ignore */ }
      }
      window.addEventListener("load", checkUpdate);
      window.addEventListener("focus", checkUpdate);
    })();
  </script>
